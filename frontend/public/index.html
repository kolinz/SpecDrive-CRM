<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード — Demo CRM</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .pipeline-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .pipeline-label {
      width: 80px;
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      text-align: right;
    }
    .pipeline-bar-wrap {
      flex: 1;
    }
    .pipeline-count {
      width: 28px;
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }
    .kpi-overdue-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }
    .section-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    @media (max-width: 900px) {
      .section-row { grid-template-columns: 1fr; }
      .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ======================================================
         サイドバー
    ======================================================= -->
    <aside class="sidebar">
      <div class="sidebar-logo">🗂 Demo CRM</div>
      <nav class="sidebar-nav">
        <a href="/index.html"       class="nav-item active">📊 ダッシュボード</a>
        <a href="/accounts.html"    class="nav-item">🏢 取引先企業</a>
        <a href="/contacts.html"    class="nav-item">👤 担当者</a>
        <a href="/opportunities.html" class="nav-item">💼 商談</a>
        <a href="/cases.html"       class="nav-item">🎫 ケース</a>
        <a href="/todos.html"       class="nav-item">✅ ToDo</a>
        <hr class="nav-separator">
        <a href="/admin-ui/users.html" class="nav-item" id="nav-admin-link" style="display:none">⚙️ システム管理 →</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="nav-user-name">—</div>
        <div class="sidebar-user-role" id="nav-user-role">—</div>
        <a href="#" id="btn-logout" style="font-size:11px;color:#93b8d4;margin-top:6px;display:inline-block;">ログアウト</a>
      </div>
    </aside>

    <!-- ======================================================
         メインコンテンツ
    ======================================================= -->
    <div class="main-content">

      <!-- トップバー -->
      <div class="topbar">
        <span class="topbar-title">ダッシュボード</span>
        <span class="topbar-spacer"></span>
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn-ai" id="btn-ai">✦ AI助言</button>
      </div>

      <!-- ページ本体 -->
      <div class="page-content">

        <!-- KPIカード -->
        <div class="kpi-grid" id="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">取引先数</div><div class="kpi-value" id="kpi-accounts">—</div></div>
          <div class="kpi-card"><div class="kpi-label">進行中商談</div><div class="kpi-value accent" id="kpi-opps">—</div></div>
          <div class="kpi-card"><div class="kpi-label">今月の受注額</div><div class="kpi-value success" id="kpi-revenue">—</div></div>
          <div class="kpi-card">
            <div class="kpi-label">未解決ケース</div>
            <div class="kpi-value danger" id="kpi-cases">—</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">期限切れ ToDo</div>
            <div id="kpi-overdue-wrap"><div class="kpi-value danger" id="kpi-overdue">—</div></div>
          </div>
        </div>

        <!-- 商談パイプライン + 直近商談・ケース -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-header"><span class="card-title">商談パイプライン</span></div>
          <div class="card-body" id="pipeline-container">
            <div class="empty-state">読み込み中...</div>
          </div>
        </div>

        <div class="section-row">
          <!-- 直近の商談 -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">直近の商談</span>
              <a href="/opportunities.html" class="btn btn-sm btn-secondary">すべて見る</a>
            </div>
            <div id="recent-opps-container">
              <div class="empty-state">読み込み中...</div>
            </div>
          </div>

          <!-- 直近のケース -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">直近のケース</span>
              <a href="/cases.html" class="btn btn-sm btn-secondary">すべて見る</a>
            </div>
            <div id="recent-cases-container">
              <div class="empty-state">読み込み中...</div>
            </div>
          </div>
        </div>

      </div><!-- /page-content -->
    </div><!-- /main-content -->

  </div><!-- /app-shell -->

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai-panel.js"></script>
  <script>
    // ============================================================
    // 認証ガード
    // ============================================================
    guardCRM();
    renderNavUserInfo();
    renderAdminNavLink();
    initAiPanel('dashboard');

    // ============================================================
    // ステージ表示順・バーの色
    // ============================================================
    const STAGE_ORDER = [
      'prospecting', 'qualification', 'proposal',
      'negotiation', 'closed_won', 'closed_lost'
    ];
    const STAGE_COLORS = {
      prospecting:   '#60a5fa',
      qualification: '#a78bfa',
      proposal:      '#fb923c',
      negotiation:   '#fbbf24',
      closed_won:    '#34d399',
      closed_lost:   '#f87171',
    };

    // ============================================================
    // KPI サマリー読み込み
    // ============================================================
    async function loadSummary() {
      try {
        const res  = await api.get('/stats/summary');
        const data = res.data;

        document.getElementById('kpi-accounts').textContent = data.accounts_total ?? '—';
        document.getElementById('kpi-opps').textContent     = data.opportunities_active ?? '—';
        document.getElementById('kpi-revenue').textContent  = formatAmount(data.revenue_this_month);
        document.getElementById('kpi-cases').textContent    = data.cases_open ?? '—';

        const overdue = data.todos_overdue ?? 0;
        const overdueEl = document.getElementById('kpi-overdue');
        overdueEl.textContent = overdue;
        if (overdue > 0) {
          overdueEl.classList.add('danger');
        }
      } catch (err) {
        console.error('KPI 読み込みエラー', err);
      }
    }

    // ============================================================
    // 商談パイプライン
    // ============================================================
    async function loadPipeline() {
      const container = document.getElementById('pipeline-container');
      try {
        const res      = await api.get('/stats/pipeline');
        const pipeline = res.data; // [{ stage, count, total_amount }]

        if (!pipeline || pipeline.length === 0) {
          container.innerHTML = '<div class="empty-state">データがありません</div>';
          return;
        }

        const maxCount = Math.max(...pipeline.map(p => p.count), 1);

        // STAGE_ORDER でソート
        const sorted = STAGE_ORDER.map(stage =>
          pipeline.find(p => p.stage === stage) || { stage, count: 0, total_amount: 0 }
        );

        container.innerHTML = sorted.map(item => {
          const widthPct = Math.round((item.count / maxCount) * 100);
          const color    = STAGE_COLORS[item.stage] || 'var(--accent)';
          return `
            <div class="pipeline-row">
              <div class="pipeline-label">${stageName(item.stage)}</div>
              <div class="pipeline-bar-wrap">
                <div class="pipeline-bar">
                  <div class="pipeline-bar-inner"
                       style="width:${widthPct}%;background:${color};"></div>
                </div>
              </div>
              <div class="pipeline-count">${item.count}</div>
              <div style="width:90px;text-align:right;font-size:12px;color:var(--text-muted);">
                ${formatAmount(item.total_amount)}
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
        console.error(err);
      }
    }

    // ============================================================
    // 直近の商談
    // ============================================================
    async function loadRecentOpportunities() {
      const container = document.getElementById('recent-opps-container');
      try {
        const res  = await api.get('/opportunities?limit=5');
        const opps = res.data;

        if (!opps || opps.length === 0) {
          container.innerHTML = '<div class="empty-state">商談がありません</div>';
          return;
        }

        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>商談名</th>
                <th>取引先</th>
                <th>ステージ</th>
                <th>金額</th>
              </tr>
            </thead>
            <tbody>
              ${opps.map(o => `
                <tr>
                  <td>
                    <a href="/opportunity-detail.html?id=${o.id}" class="link-cell">
                      ${escHtml(o.name)}
                    </a>
                  </td>
                  <td class="text-muted">${escHtml(o.account?.name || o.account_name || '—')}</td>
                  <td>${stageBadge(o.stage)}</td>
                  <td style="text-align:right;">${formatAmount(o.amount)}</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
        console.error(err);
      }
    }

    // ============================================================
    // 直近のケース
    // ============================================================
    async function loadRecentCases() {
      const container = document.getElementById('recent-cases-container');
      try {
        const res   = await api.get('/cases?limit=5');
        const cases = res.data;

        if (!cases || cases.length === 0) {
          container.innerHTML = '<div class="empty-state">ケースがありません</div>';
          return;
        }

        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>件名</th>
                <th>取引先</th>
                <th>優先度</th>
              </tr>
            </thead>
            <tbody>
              ${cases.map(c => `
                <tr>
                  <td>
                    <a href="/case-detail.html?id=${c.id}" class="link-cell">
                      ${escHtml(c.subject)}
                    </a>
                  </td>
                  <td class="text-muted">${escHtml(c.account?.name || c.account_name || '—')}</td>
                  <td>${priorityBadge(c.priority)}</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
        console.error(err);
      }
    }

    // ============================================================
    // XSS対策
    // ============================================================
    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ============================================================
    // 初期化
    // ============================================================
    Promise.all([
      loadSummary(),
      loadPipeline(),
      loadRecentOpportunities(),
      loadRecentCases(),
    ]);
  </script>
</body>
</html>
