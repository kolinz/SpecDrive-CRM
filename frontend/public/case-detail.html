<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ケース詳細 — Demo CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-logo">🗂 Demo CRM</div>
      <nav class="sidebar-nav">
        <a href="/index.html"          class="nav-item">📊 ダッシュボード</a>
        <a href="/accounts.html"       class="nav-item">🏢 取引先企業</a>
        <a href="/contacts.html"       class="nav-item">👤 担当者</a>
        <a href="/opportunities.html"  class="nav-item">💼 商談</a>
        <a href="/cases.html"          class="nav-item active">🎫 ケース</a>
        <a href="/todos.html"          class="nav-item">✅ ToDo</a>
        <hr class="nav-separator">
        <a href="/admin-ui/users.html" class="nav-item" id="nav-admin-link" style="display:none">⚙️ システム管理 →</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="nav-user-name">—</div>
        <div class="sidebar-user-role" id="nav-user-role">—</div>
        <a href="#" id="btn-logout" style="font-size:11px;color:#93b8d4;margin-top:6px;display:inline-block;">ログアウト</a>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <div class="main-content">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">ケース</span>
        <span class="topbar-spacer"></span>
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn-ai" id="btn-ai">✦ AI助言</button>
      </div>

      <div class="page-content">

        <!-- パンくず -->
        <div class="breadcrumb">
          <a href="/cases.html">ケース一覧</a>
          <span class="breadcrumb-sep">›</span>
          <span id="breadcrumb-current">新規作成</span>
        </div>

        <!-- 詳細ヘッダー -->
        <div class="detail-header">
          <div class="detail-header-left">
            <div class="detail-title" id="detail-title">新規ケース</div>
          </div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>

        <!-- フォームセクション -->
        <div class="detail-section">
          <div class="detail-section-title">ケース情報</div>
          <div id="form-area"></div>
        </div>

        <!-- 関連ToDo（表示・編集モードのみ） -->
        <div id="todos-section" style="display:none;">
          <div class="detail-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);">
              <span class="detail-section-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">関連 ToDo</span>
              <a id="btn-new-todo" href="#" class="btn btn-primary btn-sm">＋ ToDo新規作成</a>
            </div>
            <div id="todos-list"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai-panel.js"></script>
  <script>
    guardCRM();
    renderNavUserInfo();
    renderAdminNavLink();
    initAiPanel('cases');

    // ============================================================
    // 状態
    // ============================================================
    const urlParams    = new URLSearchParams(location.search);
    const caseId       = urlParams.get('id')         ? parseInt(urlParams.get('id'))         : null;
    const preAccountId = urlParams.get('account_id') ? parseInt(urlParams.get('account_id')) : null;
    let   mode         = caseId ? 'view' : 'new';
    let   caseData     = null;
    let   usersCache   = [];

    // 検索セレクト用の選択値
    let selAccountId   = preAccountId || null;
    let selAccountName = '';
    let selContactId   = null;
    let selContactName = '';

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function val(v) { return (v === null || v === undefined) ? '' : v; }

    const STATUS_OPTS = [
      ['open','オープン'],['in_progress','対応中'],['pending','保留'],
      ['resolved','解決済'],['closed','クローズ'],
    ];
    const PRIORITY_OPTS = [
      ['low','低'],['medium','中'],['high','高'],['critical','緊急'],
    ];
    const CATEGORY_OPTS = [
      ['','—'],['technical','技術'],['billing','請求'],
      ['general','一般'],['feature_request','機能要望'],['other','その他'],
    ];
    const ORIGIN_OPTS = [
      ['','—'],['email','メール'],['phone','電話'],
      ['web','Web'],['chat','チャット'],['other','その他'],
    ];
    const CATEGORY_LABELS = { technical:'技術', billing:'請求', general:'一般', feature_request:'機能要望', other:'その他' };
    const ORIGIN_LABELS   = { email:'メール', phone:'電話', web:'Web', chat:'チャット', other:'その他' };

    // ============================================================
    // ユーザー一覧取得
    // ============================================================
    async function loadUsers() {
      try {
        const res = await api.get('/users');
        usersCache = res.data || [];
      } catch { usersCache = []; }
    }

    function userOptions(selectedId) {
      return [
        '<option value="">— 未設定 —</option>',
        ...usersCache.map(u =>
          `<option value="${u.id}" ${u.id == selectedId ? 'selected' : ''}>${esc(u.name)}</option>`)
      ].join('');
    }

    function selectOpts(opts, selectedVal) {
      return opts.map(([v,l]) =>
        `<option value="${v}" ${val(selectedVal) === v ? 'selected' : ''}>${l}</option>`
      ).join('');
    }

    // ============================================================
    // 表示フォーム
    // ============================================================
    function buildViewForm(d) {
      const contactName = d.contact
        ? `${d.contact.last_name || ''} ${d.contact.first_name || ''}`.trim()
        : null;
      return `
        <div class="form-grid-2">
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">件名 <span style="color:var(--danger)">*</span></div>
            <div class="field-view-value">${esc(d.subject) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">取引先</div>
            <div class="field-view-value">
              ${d.account_id
                ? `<a href="/account-detail.html?id=${d.account_id}" style="color:var(--accent)">${esc(d.account?.name || '—')}</a>`
                : '—'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">問い合わせ元担当者</div>
            <div class="field-view-value">
              ${d.contact_id
                ? `<a href="/contact-detail.html?id=${d.contact_id}" style="color:var(--accent)">${esc(contactName)}</a>`
                : '—'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">社内担当者</div>
            <div class="field-view-value">${esc(d.assigned_user?.name || '—')}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">ステータス</div>
            <div class="field-view-value">${statusBadge(d.status)}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">優先度</div>
            <div class="field-view-value">${priorityBadge(d.priority)}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">カテゴリー</div>
            <div class="field-view-value">${CATEGORY_LABELS[d.category] || d.category || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">問い合わせ経路</div>
            <div class="field-view-value">${ORIGIN_LABELS[d.origin] || d.origin || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">対応期限</div>
            <div class="field-view-value">${formatDate(d.due_date)}</div>
          </div>
          ${d.resolved_at ? `
          <div class="form-group">
            <div class="field-view-label">解決日時</div>
            <div class="field-view-value">${formatDateTime(d.resolved_at)}</div>
          </div>` : ''}
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">内容</div>
            <div class="field-view-value" style="white-space:pre-wrap;">${esc(d.description) || '—'}</div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">解決内容</div>
            <div class="field-view-value" style="white-space:pre-wrap;">${esc(d.resolution) || '—'}</div>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム
    // ============================================================
    function buildEditForm(d) {
      return `
        <div class="form-grid-2">
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">件名 <span class="required">*</span></label>
            <input class="form-input" id="f-subject" type="text"
              value="${esc(val(d.subject))}" placeholder="ログインできない">
          </div>
          <div class="form-group">
            <label class="form-label">取引先</label>
            <div class="search-select-wrapper">
              <input class="search-select" id="f-account-input" type="text"
                placeholder="取引先名を検索..." autocomplete="off">
              <div id="f-account-list"></div>
            </div>
            <input type="hidden" id="f-account-id">
          </div>
          <div class="form-group">
            <label class="form-label">問い合わせ元担当者</label>
            <div class="search-select-wrapper">
              <input class="search-select" id="f-contact-input" type="text"
                placeholder="取引先を選択後に絞り込み..." autocomplete="off">
              <div id="f-contact-list"></div>
            </div>
            <input type="hidden" id="f-contact-id">
          </div>
          <div class="form-group">
            <label class="form-label">社内担当者</label>
            <select class="form-select" id="f-assigned">${userOptions(d.assigned_to)}</select>
          </div>
          <div class="form-group">
            <label class="form-label">ステータス <span class="required">*</span></label>
            <select class="form-select" id="f-status">${selectOpts(STATUS_OPTS, d.status || 'open')}</select>
          </div>
          <div class="form-group">
            <label class="form-label">優先度 <span class="required">*</span></label>
            <select class="form-select" id="f-priority">${selectOpts(PRIORITY_OPTS, d.priority || 'medium')}</select>
          </div>
          <div class="form-group">
            <label class="form-label">カテゴリー</label>
            <select class="form-select" id="f-category">${selectOpts(CATEGORY_OPTS, d.category)}</select>
          </div>
          <div class="form-group">
            <label class="form-label">問い合わせ経路</label>
            <select class="form-select" id="f-origin">${selectOpts(ORIGIN_OPTS, d.origin)}</select>
          </div>
          <div class="form-group">
            <label class="form-label">対応期限</label>
            <input class="form-input" id="f-due-date" type="date"
              value="${val(d.due_date) ? val(d.due_date).slice(0,10) : ''}">
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">内容</label>
            <textarea class="form-textarea" id="f-description" rows="3"
              placeholder="お問い合わせの詳細内容">${esc(val(d.description))}</textarea>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">解決内容</label>
            <textarea class="form-textarea" id="f-resolution" rows="3"
              placeholder="解決方法・対応内容">${esc(val(d.resolution))}</textarea>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム後処理（searchSelect 初期化）
    // ============================================================
    async function initEditForm(d) {
      // ---- 取引先 searchSelect ----
      const accInput  = document.getElementById('f-account-input');
      const accList   = document.getElementById('f-account-list');
      const accHidden = document.getElementById('f-account-id');

      const accSS = searchSelect({
        inputEl: accInput,
        listEl:  accList,
        fetchFn: async (q) => {
          const res = await api.get(`/accounts?q=${encodeURIComponent(q)}&limit=20`);
          return (res.data || []).map(a => ({ id: a.id, label: a.name }));
        },
        onSelect: (item) => {
          selAccountId    = item.id;
          selAccountName  = item.label;
          accHidden.value = item.id;
          // 取引先変更時：連絡先をリセット
          selContactId    = null;
          selContactName  = '';
          const ci = document.getElementById('f-contact-input');
          const ch = document.getElementById('f-contact-id');
          if (ci) ci.value = '';
          if (ch) ch.value = '';
        },
      });

      const initAccId   = d.account_id   || selAccountId;
      const initAccName = d.account?.name || selAccountName;
      if (initAccId && initAccName) {
        accSS.setValue(initAccId, initAccName);
        selAccountId    = initAccId;
        selAccountName  = initAccName;
        accHidden.value = initAccId;
      }
      accInput.addEventListener('input', () => {
        if (!accInput.value.trim()) {
          selAccountId    = null;
          accHidden.value = '';
        }
      });

      // ---- 問い合わせ元担当者 searchSelect ----
      const conInput  = document.getElementById('f-contact-input');
      const conList   = document.getElementById('f-contact-list');
      const conHidden = document.getElementById('f-contact-id');

      const conSS = searchSelect({
        inputEl: conInput,
        listEl:  conList,
        fetchFn: async (q) => {
          const aid = accHidden.value || selAccountId || '';
          const params = new URLSearchParams();
          if (q)   params.set('q', q);
          if (aid) params.set('account_id', aid);
          params.set('limit', '30');
          const res = await api.get(`/contacts?${params.toString()}`);
          return (res.data || []).map(c => ({
            id:    c.id,
            label: `${c.last_name || ''} ${c.first_name || ''}`.trim(),
          }));
        },
        onSelect: (item) => {
          selContactId    = item.id;
          selContactName  = item.label;
          conHidden.value = item.id;
        },
      });

      const initConId = d.contact_id;
      const initConName = d.contact
        ? `${d.contact.last_name || ''} ${d.contact.first_name || ''}`.trim()
        : selContactName;
      if (initConId && initConName) {
        conSS.setValue(initConId, initConName);
        selContactId    = initConId;
        selContactName  = initConName;
        conHidden.value = initConId;
      }
      conInput.addEventListener('input', () => {
        if (!conInput.value.trim()) {
          selContactId    = null;
          conHidden.value = '';
        }
      });
    }

    // ============================================================
    // アクションボタン
    // ============================================================
    function renderActions() {
      const el = document.getElementById('detail-actions');
      if (mode === 'view') {
        el.innerHTML = `
          <button class="btn btn-secondary" id="btn-edit">編集</button>
          <button class="btn btn-danger"    id="btn-delete">削除</button>`;
        document.getElementById('btn-edit').addEventListener('click', async () => {
          mode = 'edit';
          renderActions();
          document.getElementById('form-area').innerHTML = buildEditForm(caseData);
          await initEditForm(caseData);
        });
        document.getElementById('btn-delete').addEventListener('click', doDelete);
      } else {
        el.innerHTML = `
          <button class="btn btn-primary"   id="btn-save">保存</button>
          <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>`;
        document.getElementById('btn-save').addEventListener('click', doSave);
        document.getElementById('btn-cancel').addEventListener('click', doCancel);
      }
    }

    // ============================================================
    // キャンセル
    // ============================================================
    function doCancel() {
      if (mode === 'new') {
        window.location.href = '/cases.html';
      } else {
        mode = 'view';
        renderActions();
        document.getElementById('form-area').innerHTML = buildViewForm(caseData);
      }
    }

    // ============================================================
    // 保存
    // ============================================================
    async function doSave() {
      const subject  = document.getElementById('f-subject').value.trim();
      const status   = document.getElementById('f-status').value;
      const priority = document.getElementById('f-priority').value;

      if (!subject || !status || !priority) {
        showToast('件名・ステータス・優先度は必須です', 'error');
        if (!subject) document.getElementById('f-subject').focus();
        return;
      }

      const accInput = document.getElementById('f-account-input').value.trim();
      const conInput = document.getElementById('f-contact-input').value.trim();
      const accId    = accInput ? (document.getElementById('f-account-id').value || null) : null;
      const conId    = conInput ? (document.getElementById('f-contact-id').value || null) : null;
      const assignedVal = document.getElementById('f-assigned').value;

      const body = {
        subject,
        status,
        priority,
        account_id:  accId      ? parseInt(accId)      : null,
        contact_id:  conId      ? parseInt(conId)      : null,
        assigned_to: assignedVal ? parseInt(assignedVal) : null,
        category:    document.getElementById('f-category').value    || null,
        origin:      document.getElementById('f-origin').value      || null,
        due_date:    document.getElementById('f-due-date').value     || null,
        description: document.getElementById('f-description').value.trim() || null,
        resolution:  document.getElementById('f-resolution').value.trim()  || null,
      };

      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = '保存中...';

      try {
        if (mode === 'new') {
          const res = await api.post('/cases', body);
          showToast('ケースを作成しました', 'success');
          window.location.href = `/case-detail.html?id=${res.data.id}`;
        } else {
          await api.put(`/cases/${caseId}`, body);
          const detail = await api.get(`/cases/${caseId}`);
          caseData = detail.data;
          mode = 'view';
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(caseData);
          updateTitles(caseData.subject);
          showToast('保存しました', 'success');
        }
      } catch (err) {
        showToast(err.message || '保存に失敗しました', 'error');
      } finally {
        btn.disabled = false; btn.textContent = '保存';
      }
    }

    // ============================================================
    // 削除
    // ============================================================
    function doDelete() {
      showConfirm({
        title:   'ケースを削除',
        message: `「${caseData.subject}」を削除します。この操作は元に戻せません。`,
        onConfirm: async () => {
          try {
            await api.del(`/cases/${caseId}`);
            showToast('削除しました', 'success');
            setTimeout(() => { window.location.href = '/cases.html'; }, 800);
          } catch (err) {
            showToast(err.message || '削除に失敗しました', 'error');
          }
        }
      });
    }

    // ============================================================
    // タイトル更新
    // ============================================================
    function updateTitles(subject) {
      const label = subject || 'ケース';
      document.title = `${label} — Demo CRM`;
      document.getElementById('detail-title').textContent       = label;
      document.getElementById('breadcrumb-current').textContent  = label;
      document.getElementById('topbar-title').textContent        = label;
    }

    // ============================================================
    // 関連ToDo
    // ============================================================
    async function loadTodos() {
      const section    = document.getElementById('todos-section');
      const listEl     = document.getElementById('todos-list');
      const newTodoBtn = document.getElementById('btn-new-todo');

      section.style.display = '';
      if (newTodoBtn) newTodoBtn.href = `/todo-detail.html?case_id=${caseId}`;

      try {
        const res   = await api.get(`/todos?case_id=${caseId}&limit=50`);
        const todos = res.data || [];

        if (!todos.length) {
          listEl.innerHTML = '<div class="empty-state">ToDoがありません</div>';
          return;
        }

        listEl.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>タイトル</th>
                <th>担当者</th>
                <th>ステータス</th>
                <th>優先度</th>
                <th>期限日</th>
              </tr>
            </thead>
            <tbody>
              ${todos.map(t => {
                const overdue = t.due_date
                  && new Date(t.due_date) < new Date()
                  && t.status !== 'done';
                return `
                  <tr style="cursor:pointer;" onclick="location.href='/todo-detail.html?id=${t.id}'">
                    <td class="link-cell">${esc(t.title)}</td>
                    <td class="text-muted">${esc(t.assignee?.name || t.assignee_name || '—')}</td>
                    <td>${statusBadge(t.status)}</td>
                    <td>${priorityBadge(t.priority)}</td>
                    <td class="${overdue ? 'overdue' : ''}">${formatDate(t.due_date)}</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      } catch {
        listEl.innerHTML = '<div class="empty-state text-danger">ToDoの読み込みに失敗しました</div>';
      }
    }

    // ============================================================
    // 初期化
    // ============================================================
    async function init() {
      await loadUsers();

      if (mode === 'new') {
        if (preAccountId) {
          try {
            const res = await api.get(`/accounts/${preAccountId}`);
            selAccountName = res.data.name;
          } catch { /* ignore */ }
        }
        renderActions();
        document.getElementById('form-area').innerHTML = buildEditForm({
          account_id: preAccountId,
          account:    selAccountName ? { name: selAccountName } : null,
          status:     'open',
          priority:   'medium',
        });
        await initEditForm({
          account_id: preAccountId,
          account:    selAccountName ? { name: selAccountName } : null,
        });
      } else {
        try {
          const res  = await api.get(`/cases/${caseId}`);
          caseData   = res.data;
          updateTitles(caseData.subject);
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(caseData);
          loadTodos();
        } catch (err) {
          document.getElementById('form-area').innerHTML =
            '<div class="empty-state text-danger">ケースの読み込みに失敗しました</div>';
          console.error(err);
        }
      }
    }

    init();
  </script>
</body>
</html>
