<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo詳細 — Demo CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-logo">🗂 Demo CRM</div>
      <nav class="sidebar-nav">
        <a href="/index.html"          class="nav-item">📊 ダッシュボード</a>
        <a href="/accounts.html"       class="nav-item">🏢 取引先企業</a>
        <a href="/contacts.html"       class="nav-item">👤 担当者</a>
        <a href="/opportunities.html"  class="nav-item">💼 商談</a>
        <a href="/cases.html"          class="nav-item">🎫 ケース</a>
        <a href="/todos.html"          class="nav-item active">✅ ToDo</a>
        <hr class="nav-separator">
        <a href="/admin-ui/users.html" class="nav-item" id="nav-admin-link" style="display:none">⚙️ システム管理 →</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="nav-user-name">—</div>
        <div class="sidebar-user-role" id="nav-user-role">—</div>
        <a href="#" id="btn-logout" style="font-size:11px;color:#93b8d4;margin-top:6px;display:inline-block;">ログアウト</a>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <div class="main-content">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">ToDo</span>
        <span class="topbar-spacer"></span>
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn-ai" id="btn-ai">✦ AI助言</button>
      </div>

      <div class="page-content">

        <!-- パンくず -->
        <div class="breadcrumb">
          <a href="/todos.html">ToDo一覧</a>
          <span class="breadcrumb-sep">›</span>
          <span id="breadcrumb-current">新規作成</span>
        </div>

        <!-- 詳細ヘッダー -->
        <div class="detail-header">
          <div class="detail-header-left">
            <div class="detail-title" id="detail-title">新規 ToDo</div>
          </div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>

        <!-- フォームセクション -->
        <div class="detail-section">
          <div class="detail-section-title">ToDo 情報</div>
          <div id="form-area"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai-panel.js"></script>
  <script>
    guardCRM();
    renderNavUserInfo();
    renderAdminNavLink();
    initAiPanel('todos');

    // ============================================================
    // 状態
    // ============================================================
    const urlParams      = new URLSearchParams(location.search);
    const todoId         = urlParams.get('id')             ? parseInt(urlParams.get('id'))             : null;
    const preOppId       = urlParams.get('opportunity_id') ? parseInt(urlParams.get('opportunity_id')) : null;
    const preCaseId      = urlParams.get('case_id')        ? parseInt(urlParams.get('case_id'))        : null;
    const preAccountId   = urlParams.get('account_id')     ? parseInt(urlParams.get('account_id'))     : null;
    let   mode           = todoId ? 'view' : 'new';
    let   todoData       = null;
    let   usersCache     = [];

    // 検索セレクト選択値
    let selOppId   = preOppId   || null;
    let selOppName = '';
    let selCaseId  = preCaseId  || null;
    let selCaseName = '';

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function val(v) { return (v === null || v === undefined) ? '' : v; }

    const STATUS_OPTS = [
      ['open','オープン'],['in_progress','対応中'],
      ['done','完了'],['cancelled','キャンセル'],
    ];
    const PRIORITY_OPTS = [
      ['low','低'],['medium','中'],['high','高'],
    ];
    const STATUS_LABELS   = { open:'オープン', in_progress:'対応中', done:'完了', cancelled:'キャンセル' };
    const PRIORITY_LABELS = { low:'低', medium:'中', high:'高' };

    function selectOpts(opts, selectedVal) {
      return opts.map(([v,l]) =>
        `<option value="${v}" ${val(selectedVal) === v ? 'selected' : ''}>${l}</option>`
      ).join('');
    }

    // ============================================================
    // ユーザー一覧取得
    // ============================================================
    async function loadUsers() {
      try {
        const res = await api.get('/users');
        usersCache = res.data || [];
      } catch { usersCache = []; }
    }

    function userOptions(selectedId) {
      return [
        '<option value="">— 未設定 —</option>',
        ...usersCache.map(u =>
          `<option value="${u.id}" ${u.id == selectedId ? 'selected' : ''}>${esc(u.name)}</option>`)
      ].join('');
    }

    // ============================================================
    // 表示フォーム
    // ============================================================
    function buildViewForm(d) {
      const assigneeName = d.assignee
        ? `${esc(d.assignee.name || '')}`
        : (d.assignee_name ? esc(d.assignee_name) : '—');
      const oppName  = d.opportunity?.name    || d.opportunity_name || null;
      const caseName = d.case?.subject        || d.case_subject     || null;
      const isOverdue = d.due_date
        && new Date(d.due_date) < new Date()
        && d.status !== 'done';

      return `
        <div class="form-grid-2">
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">タイトル <span style="color:var(--danger)">*</span></div>
            <div class="field-view-value">${esc(d.title) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">ステータス</div>
            <div class="field-view-value">${statusBadge(d.status)}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">優先度</div>
            <div class="field-view-value">${priorityBadge(d.priority)}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">社内担当者</div>
            <div class="field-view-value">${assigneeName}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">期限日時</div>
            <div class="field-view-value ${isOverdue ? 'overdue' : ''}">
              ${d.due_date
                ? formatDate(d.due_date) + (d.due_time ? ' ' + d.due_time.slice(0,5) : '')
                : '—'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">関連商談</div>
            <div class="field-view-value">
              ${d.opportunity_id && oppName
                ? `<a href="/opportunity-detail.html?id=${d.opportunity_id}" style="color:var(--accent)">${esc(oppName)}</a>`
                : '—'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">関連ケース</div>
            <div class="field-view-value">
              ${d.case_id && caseName
                ? `<a href="/case-detail.html?id=${d.case_id}" style="color:var(--accent)">${esc(caseName)}</a>`
                : '—'}
            </div>
          </div>
          ${d.completed_at ? `
          <div class="form-group">
            <div class="field-view-label">完了日時</div>
            <div class="field-view-value">${formatDateTime(d.completed_at)}</div>
          </div>` : ''}
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">説明</div>
            <div class="field-view-value" style="white-space:pre-wrap;">${esc(d.description) || '—'}</div>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム
    // ============================================================
    function buildEditForm(d) {
      return `
        <div class="form-grid-2">
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">タイトル <span class="required">*</span></label>
            <input class="form-input" id="f-title" type="text"
              value="${esc(val(d.title))}" placeholder="提案書作成">
          </div>
          <div class="form-group">
            <label class="form-label">ステータス <span class="required">*</span></label>
            <select class="form-select" id="f-status">${selectOpts(STATUS_OPTS, d.status || 'open')}</select>
          </div>
          <div class="form-group">
            <label class="form-label">優先度 <span class="required">*</span></label>
            <select class="form-select" id="f-priority">${selectOpts(PRIORITY_OPTS, d.priority || 'medium')}</select>
          </div>
          <div class="form-group">
            <label class="form-label">社内担当者</label>
            <select class="form-select" id="f-assignee">${userOptions(d.assignee_id)}</select>
          </div>
          <div class="form-group">
            <label class="form-label">期限日</label>
            <input class="form-input" id="f-due-date" type="date"
              value="${val(d.due_date) ? val(d.due_date).slice(0,10) : ''}">
          </div>
          <div class="form-group">
            <label class="form-label">期限時刻（省略可）</label>
            <input class="form-input" id="f-due-time" type="time"
              value="${val(d.due_time) ? val(d.due_time).slice(0,5) : ''}">
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">関連商談（任意）</label>
            <div class="search-select-wrapper">
              <input class="search-select" id="f-opp-input" type="text"
                placeholder="商談名を入力して検索..." autocomplete="off">
              <div id="f-opp-list"></div>
            </div>
            <input type="hidden" id="f-opp-id">
            <div style="margin-top:4px;font-size:12px;color:var(--text-muted);">
              空欄のままにすると商談に紐付きません
            </div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">関連ケース（任意）</label>
            <div class="search-select-wrapper">
              <input class="search-select" id="f-case-input" type="text"
                placeholder="件名を入力して検索..." autocomplete="off">
              <div id="f-case-list"></div>
            </div>
            <input type="hidden" id="f-case-id">
            <div style="margin-top:4px;font-size:12px;color:var(--text-muted);">
              空欄のままにするとケースに紐付きません
            </div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">説明</label>
            <textarea class="form-textarea" id="f-description" rows="3"
              placeholder="タスクの詳細説明">${esc(val(d.description))}</textarea>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム後処理（searchSelect 初期化）
    // ============================================================
    function initEditForm(d) {
      // ---- 関連商談 searchSelect ----
      const oppInput  = document.getElementById('f-opp-input');
      const oppList   = document.getElementById('f-opp-list');
      const oppHidden = document.getElementById('f-opp-id');

      const oppSS = searchSelect({
        inputEl: oppInput,
        listEl:  oppList,
        fetchFn: async (q) => {
          const res = await api.get(`/opportunities?q=${encodeURIComponent(q)}&limit=20`);
          return (res.data || []).map(o => ({ id: o.id, label: o.name }));
        },
        onSelect: (item) => {
          selOppId       = item.id;
          selOppName     = item.label;
          oppHidden.value = item.id;
        },
      });

      // 既存値 or URL パラメータからセット
      const initOppId   = d.opportunity_id || selOppId;
      const initOppName = d.opportunity?.name || d.opportunity_name || selOppName;
      if (initOppId && initOppName) {
        oppSS.setValue(initOppId, initOppName);
        selOppId       = initOppId;
        selOppName     = initOppName;
        oppHidden.value = initOppId;
      }
      oppInput.addEventListener('input', () => {
        if (!oppInput.value.trim()) {
          selOppId        = null;
          oppHidden.value = '';
        }
      });

      // ---- 関連ケース searchSelect ----
      const caseInput  = document.getElementById('f-case-input');
      const caseList   = document.getElementById('f-case-list');
      const caseHidden = document.getElementById('f-case-id');

      const caseSS = searchSelect({
        inputEl: caseInput,
        listEl:  caseList,
        fetchFn: async (q) => {
          const res = await api.get(`/cases?q=${encodeURIComponent(q)}&limit=20`);
          return (res.data || []).map(c => ({ id: c.id, label: c.subject }));
        },
        onSelect: (item) => {
          selCaseId       = item.id;
          selCaseName     = item.label;
          caseHidden.value = item.id;
        },
      });

      const initCaseId   = d.case_id || selCaseId;
      const initCaseName = d.case?.subject || d.case_subject || selCaseName;
      if (initCaseId && initCaseName) {
        caseSS.setValue(initCaseId, initCaseName);
        selCaseId        = initCaseId;
        selCaseName      = initCaseName;
        caseHidden.value = initCaseId;
      }
      caseInput.addEventListener('input', () => {
        if (!caseInput.value.trim()) {
          selCaseId        = null;
          caseHidden.value = '';
        }
      });
    }

    // ============================================================
    // アクションボタン
    // ============================================================
    function renderActions() {
      const el = document.getElementById('detail-actions');
      if (mode === 'view') {
        el.innerHTML = `
          <button class="btn btn-secondary" id="btn-edit">編集</button>
          <button class="btn btn-danger"    id="btn-delete">削除</button>`;
        document.getElementById('btn-edit').addEventListener('click', () => {
          mode = 'edit';
          renderActions();
          document.getElementById('form-area').innerHTML = buildEditForm(todoData);
          initEditForm(todoData);
        });
        document.getElementById('btn-delete').addEventListener('click', doDelete);
      } else {
        el.innerHTML = `
          <button class="btn btn-primary"   id="btn-save">保存</button>
          <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>`;
        document.getElementById('btn-save').addEventListener('click', doSave);
        document.getElementById('btn-cancel').addEventListener('click', doCancel);
      }
    }

    // ============================================================
    // キャンセル
    // ============================================================
    function doCancel() {
      if (mode === 'new') {
        window.location.href = '/todos.html';
      } else {
        mode = 'view';
        renderActions();
        document.getElementById('form-area').innerHTML = buildViewForm(todoData);
      }
    }

    // ============================================================
    // 保存
    // ============================================================
    async function doSave() {
      const title    = document.getElementById('f-title').value.trim();
      const status   = document.getElementById('f-status').value;
      const priority = document.getElementById('f-priority').value;

      if (!title || !status || !priority) {
        showToast('タイトル・ステータス・優先度は必須です', 'error');
        if (!title) document.getElementById('f-title').focus();
        return;
      }

      const oppInputVal  = document.getElementById('f-opp-input').value.trim();
      const caseInputVal = document.getElementById('f-case-input').value.trim();
      const oppId        = oppInputVal  ? (document.getElementById('f-opp-id').value  || null) : null;
      const caseId       = caseInputVal ? (document.getElementById('f-case-id').value || null) : null;
      const assigneeVal  = document.getElementById('f-assignee').value;

      const body = {
        title,
        status,
        priority,
        assignee_id:    assigneeVal ? parseInt(assigneeVal) : null,
        opportunity_id: oppId       ? parseInt(oppId)       : null,
        case_id:        caseId      ? parseInt(caseId)      : null,
        due_date:       document.getElementById('f-due-date').value  || null,
        due_time:       document.getElementById('f-due-time').value  || null,
        description:    document.getElementById('f-description').value.trim() || null,
      };

      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = '保存中...';

      try {
        if (mode === 'new') {
          const res = await api.post('/todos', body);
          showToast('ToDoを作成しました', 'success');
          window.location.href = `/todo-detail.html?id=${res.data.id}`;
        } else {
          await api.put(`/todos/${todoId}`, body);
          const detail = await api.get(`/todos/${todoId}`);
          todoData = detail.data;
          mode = 'view';
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(todoData);
          updateTitles(todoData.title);
          showToast('保存しました', 'success');
        }
      } catch (err) {
        showToast(err.message || '保存に失敗しました', 'error');
      } finally {
        btn.disabled = false; btn.textContent = '保存';
      }
    }

    // ============================================================
    // 削除
    // ============================================================
    function doDelete() {
      showConfirm({
        title:   'ToDoを削除',
        message: `「${todoData.title}」を削除します。この操作は元に戻せません。`,
        onConfirm: async () => {
          try {
            await api.del(`/todos/${todoId}`);
            showToast('削除しました', 'success');
            setTimeout(() => { window.location.href = '/todos.html'; }, 800);
          } catch (err) {
            showToast(err.message || '削除に失敗しました', 'error');
          }
        }
      });
    }

    // ============================================================
    // タイトル更新
    // ============================================================
    function updateTitles(title) {
      const label = title || 'ToDo';
      document.title = `${label} — Demo CRM`;
      document.getElementById('detail-title').textContent       = label;
      document.getElementById('breadcrumb-current').textContent  = label;
      document.getElementById('topbar-title').textContent        = label;
    }

    // ============================================================
    // 新規作成時のプリセット（URL パラメータから）
    // ============================================================
    async function buildPresetData() {
      const preset = { status: 'open', priority: 'medium' };

      if (preOppId) {
        try {
          const res    = await api.get(`/opportunities/${preOppId}`);
          selOppId     = preOppId;
          selOppName   = res.data.name;
          preset.opportunity_id   = preOppId;
          preset.opportunity      = { name: res.data.name };
          preset.opportunity_name = res.data.name;
        } catch { /* ignore */ }
      }

      if (preCaseId) {
        try {
          const res     = await api.get(`/cases/${preCaseId}`);
          selCaseId     = preCaseId;
          selCaseName   = res.data.subject;
          preset.case_id   = preCaseId;
          preset.case      = { subject: res.data.subject };
          preset.case_subject = res.data.subject;
        } catch { /* ignore */ }
      }

      // account_id が指定されている場合は特に何もしない（ToDo に直接 account は持たない）

      return preset;
    }

    // ============================================================
    // 初期化
    // ============================================================
    async function init() {
      await loadUsers();

      if (mode === 'new') {
        const preset = await buildPresetData();
        renderActions();
        document.getElementById('form-area').innerHTML = buildEditForm(preset);
        initEditForm(preset);
      } else {
        try {
          const res  = await api.get(`/todos/${todoId}`);
          todoData   = res.data;
          updateTitles(todoData.title);
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(todoData);
        } catch (err) {
          document.getElementById('form-area').innerHTML =
            '<div class="empty-state text-danger">ToDoの読み込みに失敗しました</div>';
          console.error(err);
        }
      }
    }

    init();
  </script>
</body>
</html>
