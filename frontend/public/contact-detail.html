<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>担当者詳細 — Demo CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-logo">🗂 Demo CRM</div>
      <nav class="sidebar-nav">
        <a href="/index.html"          class="nav-item">📊 ダッシュボード</a>
        <a href="/accounts.html"       class="nav-item">🏢 取引先企業</a>
        <a href="/contacts.html"       class="nav-item active">👤 担当者</a>
        <a href="/opportunities.html"  class="nav-item">💼 商談</a>
        <a href="/cases.html"          class="nav-item">🎫 ケース</a>
        <a href="/todos.html"          class="nav-item">✅ ToDo</a>
        <hr class="nav-separator">
        <a href="/admin-ui/users.html" class="nav-item" id="nav-admin-link" style="display:none">⚙️ システム管理 →</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="nav-user-name">—</div>
        <div class="sidebar-user-role" id="nav-user-role">—</div>
        <a href="#" id="btn-logout" style="font-size:11px;color:#93b8d4;margin-top:6px;display:inline-block;">ログアウト</a>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <div class="main-content">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">担当者</span>
        <span class="topbar-spacer"></span>
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn-ai" id="btn-ai">✦ AI助言</button>
      </div>

      <div class="page-content">

        <!-- パンくず -->
        <div class="breadcrumb">
          <a href="/contacts.html">担当者一覧</a>
          <span class="breadcrumb-sep">›</span>
          <span id="breadcrumb-current">新規作成</span>
        </div>

        <!-- 詳細ヘッダー -->
        <div class="detail-header">
          <div class="detail-header-left">
            <div class="detail-title" id="detail-title">新規担当者</div>
          </div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>

        <!-- フォームセクション -->
        <div class="detail-section">
          <div class="detail-section-title">担当者情報</div>
          <div id="form-area"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai-panel.js"></script>
  <script>
    guardCRM();
    renderNavUserInfo();
    renderAdminNavLink();
    initAiPanel('contacts');

    // ============================================================
    // 状態
    // ============================================================
    const urlParams   = new URLSearchParams(location.search);
    const contactId   = urlParams.get('id')         ? parseInt(urlParams.get('id'))         : null;
    const preAccountId = urlParams.get('account_id') ? parseInt(urlParams.get('account_id')) : null;
    let   mode        = contactId ? 'view' : 'new';
    let   contactData = null;

    // 会社名検索セレクトが保持する選択値
    let   selectedAccountId   = preAccountId || null;
    let   selectedAccountName = '';

    // ============================================================
    // ユーティリティ
    // ============================================================
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function val(v) { return (v === null || v === undefined) ? '' : v; }

    // ============================================================
    // 表示フォーム
    // ============================================================
    function buildViewForm(d) {
      const fullName = `${esc(d.last_name || '')} ${esc(d.first_name || '')}`.trim();
      return `
        <div class="form-grid-2">
          <div class="form-group">
            <div class="field-view-label">姓</div>
            <div class="field-view-value">${esc(d.last_name) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">名</div>
            <div class="field-view-value">${esc(d.first_name) || '—'}</div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">会社名</div>
            <div class="field-view-value">
              ${d.account_id
                ? `<a href="/account-detail.html?id=${d.account_id}" style="color:var(--accent);">${esc(d.account?.name || d.account_name || '—')}</a>`
                : '—（未所属）'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">役職</div>
            <div class="field-view-value">${esc(d.title) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">部署</div>
            <div class="field-view-value">${esc(d.department) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">メール</div>
            <div class="field-view-value">
              ${d.email
                ? `<a href="mailto:${esc(d.email)}" style="color:var(--accent);">${esc(d.email)}</a>`
                : '—'}
            </div>
          </div>
          <div class="form-group">
            <div class="field-view-label">電話</div>
            <div class="field-view-value">${esc(d.phone) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">携帯</div>
            <div class="field-view-value">${esc(d.mobile) || '—'}</div>
          </div>
          <div class="form-group">
            <div class="field-view-label">主要担当者</div>
            <div class="field-view-value">${d.is_primary ? '✅ 主要担当者' : '—'}</div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <div class="field-view-label">メモ</div>
            <div class="field-view-value" style="white-space:pre-wrap;">${esc(d.notes) || '—'}</div>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム
    // ============================================================
    function buildEditForm(d) {
      return `
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">姓 <span class="required">*</span></label>
            <input class="form-input" id="f-last-name"  type="text" value="${esc(val(d.last_name))}"  placeholder="山田">
          </div>
          <div class="form-group">
            <label class="form-label">名 <span class="required">*</span></label>
            <input class="form-input" id="f-first-name" type="text" value="${esc(val(d.first_name))}" placeholder="太郎">
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">会社名</label>
            <div class="search-select-wrapper">
              <input
                class="search-select"
                id="f-account-input"
                type="text"
                placeholder="取引先名を入力して検索（空白で取引先未所属）"
                autocomplete="off"
              >
              <div id="f-account-list"></div>
            </div>
            <input type="hidden" id="f-account-id">
            <div style="margin-top:4px;font-size:12px;color:var(--text-muted);">
              空欄のまま保存すると取引先未所属になります
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">役職</label>
            <input class="form-input" id="f-title"      type="text" value="${esc(val(d.title))}"      placeholder="部長">
          </div>
          <div class="form-group">
            <label class="form-label">部署</label>
            <input class="form-input" id="f-department" type="text" value="${esc(val(d.department))}" placeholder="営業部">
          </div>
          <div class="form-group">
            <label class="form-label">メール</label>
            <input class="form-input" id="f-email"  type="email" value="${esc(val(d.email))}"  placeholder="example@co.jp">
          </div>
          <div class="form-group">
            <label class="form-label">電話</label>
            <input class="form-input" id="f-phone"  type="text"  value="${esc(val(d.phone))}"  placeholder="03-0000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">携帯</label>
            <input class="form-input" id="f-mobile" type="text"  value="${esc(val(d.mobile))}" placeholder="090-0000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">主要担当者</label>
            <div class="toggle-wrapper" style="margin-top:6px;">
              <label class="toggle">
                <input type="checkbox" id="f-is-primary" ${d.is_primary ? 'checked' : ''}>
                <span class="toggle-slider"></span>
              </label>
              <span id="f-primary-label" style="font-size:13px;color:var(--text-muted);">${d.is_primary ? '主要担当者として設定中' : '主要担当者ではない'}</span>
            </div>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">メモ</label>
            <textarea class="form-textarea" id="f-notes" rows="3" placeholder="備考など">${esc(val(d.notes))}</textarea>
          </div>
        </div>`;
    }

    // ============================================================
    // 編集フォーム後処理（searchSelect 初期化）
    // ============================================================
    function initEditForm(d) {
      // トグルラベル連動
      const primaryCb = document.getElementById('f-is-primary');
      const primaryLbl = document.getElementById('f-primary-label');
      if (primaryCb) {
        primaryCb.addEventListener('change', () => {
          primaryLbl.textContent = primaryCb.checked ? '主要担当者として設定中' : '主要担当者ではない';
        });
      }

      // 会社名 searchSelect 初期化
      const inputEl = document.getElementById('f-account-input');
      const listEl  = document.getElementById('f-account-list');
      const hiddenEl = document.getElementById('f-account-id');

      const ss = searchSelect({
        inputEl,
        listEl,
        fetchFn: async (q) => {
          const res = await api.get(`/accounts?q=${encodeURIComponent(q)}&limit=20`);
          return (res.data || []).map(a => ({ id: a.id, label: a.name }));
        },
        onSelect: (item) => {
          selectedAccountId   = item.id;
          selectedAccountName = item.label;
          hiddenEl.value      = item.id;
        },
      });

      // 既存データまたは URL パラメータから初期値をセット
      const initAccountId   = d.account_id   || selectedAccountId;
      const initAccountName = d.account?.name || d.account_name || selectedAccountName;

      if (initAccountId && initAccountName) {
        ss.setValue(initAccountId, initAccountName);
        selectedAccountId   = initAccountId;
        selectedAccountName = initAccountName;
        hiddenEl.value      = initAccountId;
      }

      // 入力クリア時は account_id をリセット
      inputEl.addEventListener('input', () => {
        if (!inputEl.value.trim()) {
          selectedAccountId = null;
          hiddenEl.value    = '';
        }
      });
    }

    // ============================================================
    // アクションボタン描画
    // ============================================================
    function renderActions() {
      const el = document.getElementById('detail-actions');
      if (mode === 'view') {
        el.innerHTML = `
          <button class="btn btn-secondary" id="btn-edit">編集</button>
          <button class="btn btn-danger"    id="btn-delete">削除</button>`;
        document.getElementById('btn-edit').addEventListener('click', () => {
          mode = 'edit';
          renderActions();
          document.getElementById('form-area').innerHTML = buildEditForm(contactData);
          initEditForm(contactData);
        });
        document.getElementById('btn-delete').addEventListener('click', doDelete);
      } else {
        el.innerHTML = `
          <button class="btn btn-primary"   id="btn-save">保存</button>
          <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>`;
        document.getElementById('btn-save').addEventListener('click', doSave);
        document.getElementById('btn-cancel').addEventListener('click', doCancel);
      }
    }

    // ============================================================
    // キャンセル
    // ============================================================
    function doCancel() {
      if (mode === 'new') {
        window.location.href = '/contacts.html';
      } else {
        mode = 'view';
        renderActions();
        document.getElementById('form-area').innerHTML = buildViewForm(contactData);
      }
    }

    // ============================================================
    // 保存
    // ============================================================
    async function doSave() {
      const lastName  = document.getElementById('f-last-name').value.trim();
      const firstName = document.getElementById('f-first-name').value.trim();

      if (!lastName || !firstName) {
        showToast('姓・名は必須です', 'error');
        if (!lastName) document.getElementById('f-last-name').focus();
        else           document.getElementById('f-first-name').focus();
        return;
      }

      // account_id: hidden フィールド or 入力が空なら null
      const accountInput = document.getElementById('f-account-input').value.trim();
      const accountIdVal = accountInput ? (document.getElementById('f-account-id').value || null) : null;

      const body = {
        last_name:   lastName,
        first_name:  firstName,
        account_id:  accountIdVal ? parseInt(accountIdVal) : null,
        title:       document.getElementById('f-title').value.trim()      || null,
        department:  document.getElementById('f-department').value.trim() || null,
        email:       document.getElementById('f-email').value.trim()      || null,
        phone:       document.getElementById('f-phone').value.trim()      || null,
        mobile:      document.getElementById('f-mobile').value.trim()     || null,
        is_primary:  document.getElementById('f-is-primary').checked,
        notes:       document.getElementById('f-notes').value.trim()      || null,
      };

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        if (mode === 'new') {
          const res = await api.post('/contacts', body);
          showToast('担当者を作成しました', 'success');
          window.location.href = `/contact-detail.html?id=${res.data.id}`;
        } else {
          const res = await api.put(`/contacts/${contactId}`, body);
          // 最新データを再取得して account 情報も含める
          const detail = await api.get(`/contacts/${contactId}`);
          contactData = detail.data;
          mode = 'view';
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(contactData);
          updateTitles(contactData);
          showToast('保存しました', 'success');
        }
      } catch (err) {
        showToast(err.message || '保存に失敗しました', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = '保存';
      }
    }

    // ============================================================
    // 削除
    // ============================================================
    function doDelete() {
      const name = `${contactData.last_name} ${contactData.first_name}`;
      showConfirm({
        title:   '担当者を削除',
        message: `「${name}」を削除します。この操作は元に戻せません。`,
        onConfirm: async () => {
          try {
            await api.del(`/contacts/${contactId}`);
            showToast('削除しました', 'success');
            setTimeout(() => { window.location.href = '/contacts.html'; }, 800);
          } catch (err) {
            showToast(err.message || '削除に失敗しました', 'error');
          }
        }
      });
    }

    // ============================================================
    // タイトル更新
    // ============================================================
    function updateTitles(d) {
      const name = `${d.last_name || ''} ${d.first_name || ''}`.trim() || '担当者';
      document.title = `${name} — Demo CRM`;
      document.getElementById('detail-title').textContent       = name;
      document.getElementById('breadcrumb-current').textContent  = name;
      document.getElementById('topbar-title').textContent        = name;
    }

    // ============================================================
    // 初期化
    // ============================================================
    async function init() {
      if (mode === 'new') {
        // preAccountId がある場合、会社名を事前取得
        if (preAccountId) {
          try {
            const res = await api.get(`/accounts/${preAccountId}`);
            selectedAccountName = res.data.name;
          } catch { /* 取得失敗は無視 */ }
        }
        renderActions();
        document.getElementById('form-area').innerHTML = buildEditForm({
          account_id:   preAccountId,
          account_name: selectedAccountName,
          account:      selectedAccountName ? { name: selectedAccountName } : null,
        });
        initEditForm({
          account_id:   preAccountId,
          account_name: selectedAccountName,
          account:      selectedAccountName ? { name: selectedAccountName } : null,
        });
      } else {
        try {
          const res   = await api.get(`/contacts/${contactId}`);
          contactData = res.data;
          updateTitles(contactData);
          renderActions();
          document.getElementById('form-area').innerHTML = buildViewForm(contactData);
        } catch (err) {
          document.getElementById('form-area').innerHTML =
            '<div class="empty-state text-danger">担当者の読み込みに失敗しました</div>';
          console.error(err);
        }
      }
    }

    init();
  </script>
</body>
</html>
